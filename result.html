<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA NEET (UG) 2026 Re Exam Score Card</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .login-card h2 {
            color: #1a365d;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3182ce;
        }

        /* Captcha Styling Section */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .captcha-box {
            background: repeating-linear-gradient(45deg, #edf2f7, #edf2f7 10px, #e2e8f0 10px, #e2e8f0 20px);
            color: #2b6cb0;
            font-size: 22px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 4px;
            padding: 10px 20px;
            border-radius: 6px;
            user-select: none;
            border: 1px dashed #cbd5e1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .refresh-btn {
            background: none;
            border: none;
            color: #4a5568;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
            transition: color 0.2s;
        }

        .refresh-btn:hover {
            color: #2b6cb0;
        }

        .error-message {
            color: #e53e3e;
            background-color: #fff5f5;
            border: 1px solid #fed7d7;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .login-btn {
            width: 100%;
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #2b6cb0;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>NTA NEET (UG) Re Exam 2026 Score Card</h2>
        
        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" onsubmit="validateLogin(event)">
            <div class="form-group">
                <label for="appNumber">Application Number</label>
                <input type="text" id="appNumber" required placeholder="Enter 12-digit Application No.">
            </div>

            <div class="form-group">
                <label for="mobileNumber">Registered Mobile Number</label>
                <input type="tel" id="mobileNumber" required placeholder="Enter 10-digit Mobile No.">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter Password">
            </div>

            <div class="form-group">
                <label for="captchaInput">Security Verification (Captcha)</label>
                <div class="captcha-container">
                    <div id="captchaDisplay" class="captcha-box"></div>
                    <button type="button" class="refresh-btn" onclick="generateCaptcha()" title="Refresh Captcha">🔄</button>
                </div>
                <input type="text" id="captchaInput" required placeholder="Enter the code shown above">
            </div>

            <button type="submit" class="login-btn">Log In & Download Score Card</button>
        </form>
    </div>

    <script>
        let currentCaptcha = "";

        // Function to generate random 6-character Captcha string
        function generateCaptcha() {
            const chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let result = "";
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = result;
            document.getElementById("captchaDisplay").innerText = currentCaptcha;
            document.getElementById("captchaInput").value = ""; // clear previous input
        }

        // Form Validation and Redirect Logic
        function validateLogin(event) {
            event.preventDefault(); // Stop standard form refresh

            const appNumberInput = document.getElementById("appNumber").value.trim();
            const mobileInput = document.getElementById("mobileNumber").value.trim();
            const passwordInput = document.getElementById("password").value;
            const captchaInput = document.getElementById("captchaInput").value.trim();
            const errorDiv = document.getElementById("errorMessage");

            // Preset validation requirements
            const targetAppNumber = "260410025410";
            const targetMobile = "7439108810";
            const targetPassword = "Yash2002@";

            // Verification Check
            if (appNumberInput !== targetAppNumber) {
                showError("Invalid Application Number.");
                generateCaptcha();
                return;
            }

            if (mobileInput !== targetMobile) {
                showError("Invalid Registered Mobile Number.");
                generateCaptcha();
                return;
            }

            if (passwordInput !== targetPassword) {
                showError("Incorrect Password.");
                generateCaptcha();
                return;
            }

            if (captchaInput.toLowerCase() !== currentCaptcha.toLowerCase()) {
                showError("Captcha text does not match. Please try again.");
                generateCaptcha();
                return;
            }

            // If all details match perfectly, clear errors and redirect to download link
            errorDiv.style.display = "none";
            window.location.href = "https://go.fliplink.me/view/4867FBFA-6E88-4326-B490-9C87CBD79544";
        }

        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.innerText = message;
            errorDiv.style.display = "block";
        }

        // Auto-run when page loads to set the initial Captcha
        window.onload = generateCaptcha;
    </script>

</body>
</html>
